server:
  port: 8064
  servlet:
    context-path: /closedcart

# Spring boot admin server configs
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

spring:
  application:
    name: ciaas-server
  boot:
    admin:
      client:
        url: http://localhost:8082
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/MotoCartEnterprise
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  properties:
    hibernate:
      dialect: org.hibernate.dialect.PostgreSQLDialect
      format_sql: true

# Service Discovery config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

# JWT config
jwt:
  secret:
    private: ${JWT_PRIVATE_KEY}
    public: 
  expiration:
    access-token: 900000 # 15 minutes
    refresh-token: 604800000 # 7 days

# Disable common JWT validation for now
moto-cart:
  security:
    header-auth:
      enabled: false

logging:
  level:
    root: INFO